<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Image → Prompt Studio</title>
<style>
  :root {
    --bg: #12141a; --panel: #1b1e27; --border: #2c303d;
    --text: #e8eaf0; --muted: #8b90a0; --accent: #f0a35e; --accent2: #6ea8fe;
  }
  * { box-sizing: border-box; margin: 0; }
  body {
    background: var(--bg); color: var(--text);
    font-family: "Sarabun", "Segoe UI", system-ui, sans-serif;
    min-height: 100vh; padding: 24px;
  }
  h1 { font-size: 20px; margin-bottom: 4px; }
  h1 span { color: var(--accent); }
  .sub { color: var(--muted); font-size: 13px; margin-bottom: 20px; }
  .layout { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; max-width: 1200px; margin: 0 auto; }
  @media (max-width: 860px) { .layout { grid-template-columns: 1fr; } }
  .panel { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 18px; }
  .panel h2 { font-size: 14px; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 12px; }

  #drop {
    border: 2px dashed var(--border); border-radius: 10px; padding: 28px;
    text-align: center; color: var(--muted); cursor: pointer; transition: border-color .15s;
  }
  #drop.over, #drop:hover { border-color: var(--accent); color: var(--text); }
  #preview { max-width: 100%; max-height: 260px; border-radius: 8px; display: none; margin: 12px auto 0; }

  .chips { display: flex; flex-wrap: wrap; gap: 8px; margin: 14px 0; }
  .chip {
    background: transparent; border: 1px solid var(--border); color: var(--text);
    border-radius: 999px; padding: 6px 14px; font-size: 13px; cursor: pointer; font-family: inherit;
  }
  .chip.on { background: var(--accent); border-color: var(--accent); color: #1a1205; font-weight: 600; }

  input[type=text], input[type=password] {
    width: 100%; background: var(--bg); border: 1px solid var(--border); color: var(--text);
    border-radius: 8px; padding: 9px 12px; font-size: 14px; font-family: inherit; margin-bottom: 10px;
  }
  label { font-size: 12px; color: var(--muted); display: block; margin-bottom: 4px; }

  #go {
    width: 100%; background: var(--accent); color: #1a1205; border: 0; border-radius: 8px;
    padding: 12px; font-size: 15px; font-weight: 700; cursor: pointer; font-family: inherit;
  }
  #go:disabled { opacity: .5; cursor: wait; }

  .out { position: relative; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 14px; margin-bottom: 14px; }
  .out pre { white-space: pre-wrap; word-break: break-word; font-family: "SF Mono", Menlo, monospace; font-size: 13px; line-height: 1.55; color: var(--text); min-height: 40px; }
  .out .tag { font-size: 11px; color: var(--accent2); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 8px; display: block; }
  .copy {
    position: absolute; top: 10px; right: 10px; background: var(--border); color: var(--text);
    border: 0; border-radius: 6px; padding: 4px 10px; font-size: 12px; cursor: pointer; font-family: inherit;
  }
  .copy:active { background: var(--accent); color: #1a1205; }
  #status { font-size: 13px; color: var(--muted); margin-top: 10px; min-height: 18px; }
  #status.err { color: #ff7a7a; }
</style>
</head>
<body>
<h1>Image → <span>Prompt</span> Studio</h1>
<p class="sub">โยนรูปเข้ามา เลือกสไตล์ แล้วรับ prompt คุณภาพสูงไปใช้กับ Midjourney / SD / Flux ได้เลย</p>

<div class="layout">
  <!-- LEFT -->
  <div class="panel">
    <h2>1 · รูปภาพ</h2>
    <div id="drop">คลิกหรือลากรูปมาวางที่นี่<br><small>JPG / PNG / WebP</small></div>
    <input id="file" type="file" accept="image/*" hidden>
    <img id="preview" alt="">

    <h2 style="margin-top:18px">2 · สไตล์</h2>
    <div class="chips" id="chips"></div>

    <h2 style="margin-top:6px">3 · ช่วงเวลา / แสง</h2>
    <div class="chips" id="times"></div>

    <h2 style="margin-top:6px">4 · สภาพอากาศ</h2>
    <div class="chips" id="weather"></div>

    <label>โน้ตเพิ่มเติม (ไม่บังคับ)</label>
    <input id="note" type="text" placeholder="เช่น เปลี่ยนเป็นตอนเช้า, เพิ่มหิมะ, มุมมองจากด้านบน">

    <label>Anthropic API Key (เก็บในเครื่องคุณเท่านั้น)</label>
    <input id="key" type="password" placeholder="sk-ant-...">

    <button id="go">✨ สร้าง Prompt</button>
    <div id="status"></div>
  </div>

  <!-- RIGHT -->
  <div class="panel">
    <h2>ผลลัพธ์</h2>
    <div class="out">
      <span class="tag">Prompt</span>
      <button class="copy" data-for="prompt">คัดลอก</button>
      <pre id="prompt">—</pre>
    </div>
    <div class="out">
      <span class="tag">Negative Prompt</span>
      <button class="copy" data-for="negative">คัดลอก</button>
      <pre id="negative">—</pre>
    </div>
  </div>
</div>

<script type="module">
import Anthropic from "https://esm.sh/@anthropic-ai/sdk";

const STYLES = [
  "ตามต้นฉบับ", "Ghibli animation", "Makoto Shinkai anime", "Pen sketch (ink)",
  "Pencil sketch", "Watercolor", "Oil painting", "Photorealistic 35mm",
  "Cyberpunk neon", "Pixel art", "3D Pixar style", "Flat illustration",
  "Thai doodle journal", "Watercolor food art", "Kawaii food chart",
  "Fine-liner ink drawing", "Crosshatch pen engraving",
  "Hidden-object puzzle", "Anime background art", "Vintage copper engraving",
  "Ukiyo-e woodblock", "Flemish Renaissance oil", "Architectural 3D render",
  "Thai wood carving relief", "Neon sign board",
];

// ช่วงเวลาของแสง — ตัวแรก = ไม่เปลี่ยน
const TIMES = {
  "แสงตามต้นฉบับ": "",
  "กลางวัน": "bright midday daylight, blue sky, clear crisp sunlight, vivid saturated colors",
  "ใกล้ค่ำ": "golden hour just before sunset, warm orange and pink sky, long soft shadows, glowing rim light",
  "กลางคืน": "night scene, deep blue sky, artificial and window lights glowing warmly against the darkness, moody low-key lighting",
};
let timeOfDay = Object.keys(TIMES)[0];

// สภาพอากาศ — ตัวแรก = ไม่เปลี่ยน
const WEATHER = {
  "อากาศตามต้นฉบับ": "",
  "ฝนตกปรอยๆ": "light drizzle, fine mist of rain, soft wet sheen on every surface, gentle moody atmosphere",
  "ฝนตกหนัก": "heavy rain, falling rain streaks, wet reflective ground with raindrop ripples in puddles, overcast grey sky, hazy rain atmosphere",
  "หิมะตก": "snowfall, soft snowflakes drifting in the air, snow accumulating on surfaces and rooftops, cold wintry diffused light",
  "หมอกลง": "thick morning fog, soft diffused light, distant objects fading into white mist, quiet mysterious atmosphere",
};
let weather = Object.keys(WEATHER)[0];

// คำอธิบายละเอียดสำหรับ style ที่ชื่อสั้นไม่พอ — ถ้าไม่มีในนี้จะใช้ชื่อ chip ตรงๆ
const STYLE_HINTS = {
  "Thai doodle journal":
    "cute hand-drawn journal doodle style, playful ink outlines filled with loose soft watercolor, handwritten annotation labels and arrows pointing at parts of the subject, decorative hand-lettered title banner, pastel palette on plain white paper, Thai food-blogger sketchnote aesthetic",
  "Watercolor food art":
    "realistic watercolor food illustration, delicate layered washes with warm appetizing colors, soft edges but fine detail on food textures, clean white background, botanical-illustration level of care",
  "Kawaii food chart":
    "kawaii watercolor illustration chart, subject broken into multiple small vignettes arranged neatly on a white background, each with a tidy name label, cute cat mascots playfully interacting with the items, soft watercolor textures",
  "Fine-liner ink drawing":
    "hyper-detailed fine-liner pen drawing with a 0.03 ink pen, monochrome black ink on white paper, meticulous architectural rendering, fine stippling and hatching for tonal shading, no color",
  "Crosshatch pen engraving":
    "dense pen-and-ink crosshatch illustration, engraving-like parallel and cross line shading for every surface, high-contrast black and white, precise controlled linework, vintage etching atmosphere",
  "Hidden-object puzzle":
    "flat vector seek-and-find puzzle illustration, clean bold outlines and cheerful pastel flat colors, densely packed busy scene full of small everyday objects to spot, playful cartoon style, no gradients",
  "Anime background art":
    "lush anime background art / key visual scenery, painterly detailed environment, cinematic lighting and volumetric god rays, rich saturated colors, Kyoto Animation / Makoto Shinkai quality background painting",
  "Vintage copper engraving":
    "antique copperplate engraving in the style of Canaletto vedute, fine parallel-line etching on aged sepia-toned paper, extremely detailed architecture and tiny figures, old-master 18th-century print",
  "Ukiyo-e woodblock":
    "traditional Japanese ukiyo-e woodblock print in the style of Hokusai, flat areas of indigo and beige, bold outlined waves and clouds, visible woodgrain and aged paper texture, Edo-period aesthetic",
  "Flemish Renaissance oil":
    "Early Netherlandish / Flemish Renaissance oil painting in the style of Jan van Eyck, meticulous jewel-toned detail, luminous glazes, symbolic religious composition, deep rich reds and blues, 15th-century panel painting",
  "Architectural 3D render":
    "photorealistic architectural visualization render, aerial drone view of the building in its landscape, soft realistic global-illumination lighting, atmospheric haze, ArchViz quality, crisp materials and reflections",
  "Thai wood carving relief":
    "traditional Thai carved wooden bas-relief mural, hand-carved and painted teak wood, layered depth with rural Thai village scenes, ornate gilded floral border frame, folk craftsmanship",
  "Neon sign board":
    "collage of glowing neon sign tubes on a dark wall, bright saturated neon colors (pink, cyan, yellow, green), Japanese and English signage lettering, realistic glass-tube glow and reflections, night bar aesthetic",
};

const $ = (id) => document.getElementById(id);
let imageData = null; // { data: base64, media_type }
let style = STYLES[0];

// --- style chips ---
const chipsEl = $("chips");
STYLES.forEach((s, i) => {
  const b = document.createElement("button");
  b.className = "chip" + (i === 0 ? " on" : "");
  b.textContent = s;
  b.onclick = () => {
    style = s;
    chipsEl.querySelectorAll(".chip").forEach(c => c.classList.remove("on"));
    b.classList.add("on");
  };
  chipsEl.appendChild(b);
});

// --- time-of-day chips ---
const timesEl = $("times");
Object.keys(TIMES).forEach((t, i) => {
  const b = document.createElement("button");
  b.className = "chip" + (i === 0 ? " on" : "");
  b.textContent = t;
  b.onclick = () => {
    timeOfDay = t;
    timesEl.querySelectorAll(".chip").forEach(c => c.classList.remove("on"));
    b.classList.add("on");
  };
  timesEl.appendChild(b);
});

// --- weather chips ---
const weatherEl = $("weather");
Object.keys(WEATHER).forEach((w, i) => {
  const b = document.createElement("button");
  b.className = "chip" + (i === 0 ? " on" : "");
  b.textContent = w;
  b.onclick = () => {
    weather = w;
    weatherEl.querySelectorAll(".chip").forEach(c => c.classList.remove("on"));
    b.classList.add("on");
  };
  weatherEl.appendChild(b);
});

// --- image load: resize to ≤1568px, jpeg, to keep tokens low ---
function loadImage(file) {
  const img = new Image();
  img.onload = () => {
    const MAX = 1568;
    const scale = Math.min(1, MAX / Math.max(img.width, img.height));
    const canvas = document.createElement("canvas");
    canvas.width = Math.round(img.width * scale);
    canvas.height = Math.round(img.height * scale);
    canvas.getContext("2d").drawImage(img, 0, 0, canvas.width, canvas.height);
    const dataUrl = canvas.toDataURL("image/jpeg", 0.85);
    imageData = { data: dataUrl.split(",")[1], media_type: "image/jpeg" };
    $("preview").src = dataUrl;
    $("preview").style.display = "block";
    $("drop").textContent = "เปลี่ยนรูป — คลิกหรือลากรูปใหม่มาวาง";
  };
  img.src = URL.createObjectURL(file);
}

const drop = $("drop");
drop.onclick = () => $("file").click();
$("file").onchange = (e) => e.target.files[0] && loadImage(e.target.files[0]);
drop.ondragover = (e) => { e.preventDefault(); drop.classList.add("over"); };
drop.ondragleave = () => drop.classList.remove("over");
drop.ondrop = (e) => {
  e.preventDefault(); drop.classList.remove("over");
  const f = e.dataTransfer.files[0];
  if (f && f.type.startsWith("image/")) loadImage(f);
};

// --- API key persistence ---
$("key").value = localStorage.getItem("anthropic_key") || "";
$("key").onchange = () => localStorage.setItem("anthropic_key", $("key").value.trim());

// --- copy buttons ---
document.querySelectorAll(".copy").forEach(btn => {
  btn.onclick = () => {
    navigator.clipboard.writeText($(btn.dataset.for).textContent);
    btn.textContent = "คัดลอกแล้ว ✓";
    setTimeout(() => (btn.textContent = "คัดลอก"), 1500);
  };
});

// --- generate ---
$("go").onclick = async () => {
  const status = $("status");
  status.classList.remove("err");
  if (!imageData) { status.textContent = "ใส่รูปก่อนครับ"; status.classList.add("err"); return; }
  const key = $("key").value.trim();
  if (!key) { status.textContent = "ใส่ Anthropic API Key ก่อนครับ"; status.classList.add("err"); return; }

  $("go").disabled = true;
  status.textContent = "กำลังวิเคราะห์ภาพและสร้าง prompt…";

  const client = new Anthropic({ apiKey: key, dangerouslyAllowBrowser: true });
  const styleInstruction = style === "ตามต้นฉบับ"
    ? "Keep the original style of the image."
    : `Re-imagine the image in this target style: ${STYLE_HINTS[style] || style}.`;
  const timeHint = TIMES[timeOfDay];
  const timeInstruction = timeHint ? ` Set the scene at this time of day / lighting: ${timeHint}.` : "";
  const weatherHint = WEATHER[weather];
  const weatherInstruction = weatherHint ? ` Weather in the scene: ${weatherHint}.` : "";
  const note = $("note").value.trim();

  try {
    const response = await client.messages.create({
      model: "claude-opus-4-8",
      max_tokens: 2048,
      system: "You are an expert prompt engineer for AI image generation (Midjourney, Stable Diffusion, Flux). Deconstruct the attached image into: subject, action/state, setting, lighting, composition/camera, and distinctive details. Then write ONE English text-to-image prompt as a single comma-separated paragraph, ordered from most to least important, that would recreate the image in the requested style. Do not spam quality keywords. Also write a matching negative prompt.",
      output_config: {
        format: {
          type: "json_schema",
          schema: {
            type: "object",
            properties: {
              prompt: { type: "string" },
              negative_prompt: { type: "string" },
            },
            required: ["prompt", "negative_prompt"],
            additionalProperties: false,
          },
        },
      },
      messages: [{
        role: "user",
        content: [
          { type: "image", source: { type: "base64", ...imageData } },
          { type: "text", text: `${styleInstruction}${timeInstruction}${weatherInstruction}${note ? " Additional user notes: " + note : ""}` },
        ],
      }],
    });

    const text = response.content.find(b => b.type === "text")?.text ?? "{}";
    const out = JSON.parse(text);
    $("prompt").textContent = out.prompt || "—";
    $("negative").textContent = out.negative_prompt || "—";
    status.textContent = "เสร็จแล้ว ✓";
  } catch (err) {
    status.textContent = "ผิดพลาด: " + (err?.message || err);
    status.classList.add("err");
  } finally {
    $("go").disabled = false;
  }
};
</script>
</body>
</html>
